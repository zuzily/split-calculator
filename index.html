<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分帳計算機</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --ink: #1A1A1A;
    --ink2: #555550;
    --ink3: #999990;
    --accent: #2D5A3D;
    --accent-light: #EAF2EC;
    --accent2: #C8512A;
    --accent2-light: #FDF0EB;
    --border: #E5E2DA;
    --border2: #D0CCC4;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1.5px solid var(--ink);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 0.25rem;
  }

  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--ink);
  }

  .subtitle {
    font-size: 0.8rem;
    color: var(--ink3);
    font-family: var(--mono);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .section-label {
    font-size: 0.7rem;
    font-family: var(--mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 1rem;
  }

  /* Activity name */
  .activity-input {
    width: 100%;
    font-family: var(--sans);
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--border2);
    padding: 0.25rem 0;
    outline: none;
    transition: border-color 0.2s;
  }
  .activity-input:focus { border-bottom-color: var(--accent); }
  .activity-input::placeholder { color: var(--ink3); font-weight: 400; }

  /* Expense rows */
  .expense-list { display: flex; flex-direction: column; gap: 0.75rem; }

  .expense-row {
    display: grid;
    grid-template-columns: 1fr 90px 110px 32px;
    gap: 0.5rem;
    align-items: start;
    padding: 0.75rem;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
    transition: border-color 0.15s;
  }
  .expense-row:focus-within { border-color: var(--border2); }

  .input-group { display: flex; flex-direction: column; gap: 0.2rem; }
  .input-group label { font-size: 0.65rem; font-family: var(--mono); color: var(--ink3); letter-spacing: 0.06em; text-transform: uppercase; }

  .field {
    font-family: var(--sans);
    font-size: 0.875rem;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 0.2rem 0;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  .field:focus { border-bottom-color: var(--accent); }
  .field::placeholder { color: var(--border2); }
  .field[type=number] { font-family: var(--mono); }

  .field-split {
    font-size: 0.8rem;
    resize: none;
    height: 44px;
    line-height: 1.4;
  }

  .remove-btn {
    width: 28px; height: 28px;
    border: 1px solid var(--border2);
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    color: var(--ink3);
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    margin-top: 18px;
    flex-shrink: 0;
  }
  .remove-btn:hover { background: var(--accent2-light); border-color: var(--accent2); color: var(--accent2); }

  .add-btn {
    width: 100%;
    padding: 0.6rem;
    margin-top: 0.5rem;
    background: transparent;
    border: 1.5px dashed var(--border2);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--ink3);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .calc-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }
  .calc-btn:hover { background: var(--accent); transform: translateY(-1px); }
  .calc-btn:active { transform: translateY(0); }

  /* Results */
  #result { margin-top: 1rem; }

  .result-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 0.75rem;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 0.75rem 1.25rem;
    background: var(--ink);
    color: #fff;
    font-size: 0.7rem;
    font-family: var(--mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .result-header .total {
    font-size: 0.85rem;
    font-weight: 500;
  }

  .balance-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }

  .balance-item {
    padding: 0.875rem 1.25rem;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
  }
  .balance-item:nth-child(even) { border-right: none; }
  .balance-item:nth-last-child(-n+2) { border-bottom: none; }

  .balance-name {
    font-size: 0.875rem;
    font-weight: 500;
  }

  .balance-amount {
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
  }

  .amount-pos { background: var(--accent-light); color: var(--accent); }
  .amount-neg { background: var(--accent2-light); color: var(--accent2); }
  .amount-zero { background: var(--bg); color: var(--ink3); }

  .transfer-list { padding: 0.5rem 0; }

  .transfer-item {
    display: flex;
    align-items: center;
    padding: 0.75rem 1.25rem;
    gap: 0.75rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .transfer-item:last-child { border-bottom: none; }
  .transfer-item:hover { background: var(--bg); }

  .t-from { font-size: 0.9rem; font-weight: 500; flex: 1; }
  .t-arrow {
    font-family: var(--mono);
    color: var(--ink3);
    font-size: 0.75rem;
  }
  .t-to { font-size: 0.9rem; font-weight: 500; flex: 1; text-align: right; }
  .t-amount {
    font-family: var(--mono);
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--accent);
    min-width: 80px;
    text-align: right;
  }

  .settled {
    text-align: center;
    padding: 2rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--ink3);
    letter-spacing: 0.05em;
  }

  .error-msg {
    color: var(--accent2);
    font-size: 0.8rem;
    font-family: var(--mono);
    padding: 0.5rem 0;
  }

  .hint {
    font-size: 0.72rem;
    color: var(--ink3);
    margin-top: 0.4rem;
    font-family: var(--mono);
    line-height: 1.5;
  }

  @media (max-width: 500px) {
    .expense-row {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
    }
    .expense-row .input-group:nth-child(3) { grid-column: 1 / -1; }
    .remove-btn { grid-column: 2; justify-self: end; margin-top: 0; }
    .balance-grid { grid-template-columns: 1fr; }
    .balance-item { border-right: none; }
    .balance-item:last-child { border-bottom: none; }
    .balance-item:nth-last-child(2) { border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-top">
      <h1>分帳計算機</h1>
    </div>
    <p class="subtitle">出遊支出結算 · 誰付誰還一目了然</p>
  </header>

  <div class="section">
    <div class="section-label">活動名稱</div>
    <input class="activity-input" id="activity-name" placeholder="例：花蓮三天兩夜" type="text">
  </div>

  <div class="section">
    <div class="section-label">支出明細</div>
    <div class="expense-list" id="expense-list"></div>
    <button class="add-btn" onclick="addExpense()">+ 新增一筆支出</button>
    <p class="hint">分攤人員：用頓號（、）或逗號分隔，例如：小明、小美、阿偉</p>
  </div>

  <button class="calc-btn" onclick="calculate()">計算結算結果</button>

  <div id="result"></div>
</div>

<script>
let expenseCount = 0;

function addExpense(item='', amount='', payer='', splitWith='') {
  expenseCount++;
  const id = expenseCount;
  const list = document.getElementById('expense-list');
  const div = document.createElement('div');
  div.className = 'expense-row';
  div.id = 'exp-' + id;
  div.innerHTML = `
    <div class="input-group">
      <label>支出項目</label>
      <input class="field" placeholder="例：午餐" value="${item}">
    </div>
    <div class="input-group">
      <label>金額（元）</label>
      <input class="field" type="number" placeholder="0" min="0" value="${amount}">
    </div>
    <div class="input-group">
      <label>付款人</label>
      <input class="field" placeholder="例：小明" value="${payer}">
    </div>
    <div class="input-group" style="grid-column: 1 / -1; margin-top: 0.25rem;">
      <label>分攤人員（含付款人）</label>
      <input class="field" placeholder="小明、小美、阿偉" value="${splitWith}">
    </div>
    <button class="remove-btn" onclick="removeExpense(${id})" title="刪除">×</button>
  `;
  // fix layout: put split field and remove btn in proper grid
  div.style.gridTemplateColumns = '1fr 90px 110px 32px';
  list.appendChild(div);
  // re-arrange: split field spans full width
  div.querySelector('.input-group:nth-child(4)').style.gridColumn = '1 / span 3';
}

function removeExpense(id) {
  const rows = document.querySelectorAll('.expense-row');
  if (rows.length <= 1) return;
  document.getElementById('exp-' + id)?.remove();
}

function parsePeople(str) {
  return str.split(/[、，,、\s]+/).map(s => s.trim()).filter(Boolean);
}

function calculate() {
  const rows = document.querySelectorAll('.expense-row');
  const expenses = [];

  for (const row of rows) {
    const inputs = row.querySelectorAll('input');
    const item = inputs[0].value.trim();
    const amount = parseFloat(inputs[1].value) || 0;
    const payer = inputs[2].value.trim();
    const splitRaw = inputs[3].value.trim();
    const splitPeople = parsePeople(splitRaw);

    if (!payer || amount <= 0 || splitPeople.length === 0) continue;
    expenses.push({ item, amount, payer, splitPeople });
  }

  if (expenses.length === 0) {
    document.getElementById('result').innerHTML =
      '<p class="error-msg">請至少填入一筆有效支出（金額、付款人、分攤人員都要填）</p>';
    return;
  }

  // Collect all people
  const allPeople = new Set();
  expenses.forEach(e => {
    allPeople.add(e.payer);
    e.splitPeople.forEach(p => allPeople.add(p));
  });

  // Calculate balance per person: positive = should receive, negative = owes
  const balance = {};
  allPeople.forEach(p => balance[p] = 0);

  expenses.forEach(e => {
    const perPerson = e.amount / e.splitPeople.length;
    balance[e.payer] += e.amount;
    e.splitPeople.forEach(p => balance[p] -= perPerson);
  });

  // Round
  Object.keys(balance).forEach(k => balance[k] = Math.round(balance[k]));

  // Calculate minimum transfers
  const creditors = Object.entries(balance).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]);
  const debtors = Object.entries(balance).filter(([,v]) => v < 0).sort((a,b) => a[1]-b[1]);
  const transfers = [];
  const c = creditors.map(([n,v]) => ({name: n, val: v}));
  const d = debtors.map(([n,v]) => ({name: n, val: -v}));
  let ci = 0, di = 0;
  while (ci < c.length && di < d.length) {
    const amt = Math.min(c[ci].val, d[di].val);
    if (amt > 0) transfers.push({from: d[di].name, to: c[ci].name, amount: amt});
    c[ci].val -= amt; d[di].val -= amt;
    if (c[ci].val < 1) ci++;
    if (d[di].val < 1) di++;
  }

  const total = expenses.reduce((s,e) => s+e.amount, 0);
  const activityName = document.getElementById('activity-name').value.trim() || '本次旅遊';

  // Render
  let html = '';

  // Balance table
  html += `<div class="result-section">
    <div class="result-header">
      <span>${activityName}｜每人帳目</span>
      <span class="total">總計 $${total.toLocaleString()}</span>
    </div>
    <div class="balance-grid">`;

  Object.entries(balance).sort((a,b) => b[1]-a[1]).forEach(([name, val]) => {
    let cls = val > 0 ? 'amount-pos' : val < 0 ? 'amount-neg' : 'amount-zero';
    let label = val > 0 ? `+$${val.toLocaleString()}` : val < 0 ? `-$${Math.abs(val).toLocaleString()}` : '平帳';
    html += `<div class="balance-item">
      <span class="balance-name">${name}</span>
      <span class="balance-amount ${cls}">${label}</span>
    </div>`;
  });

  html += `</div></div>`;

  // Transfer list
  html += `<div class="result-section">
    <div class="result-header"><span>轉帳清單</span><span>${transfers.length} 筆</span></div>`;

  if (transfers.length === 0) {
    html += `<div class="settled">大家都平帳了，不需要轉帳！</div>`;
  } else {
    html += `<div class="transfer-list">`;
    transfers.forEach(t => {
      html += `<div class="transfer-item">
        <span class="t-from">${t.from}</span>
        <span class="t-arrow">→</span>
        <span class="t-to">${t.to}</span>
        <span class="t-amount">$${t.amount.toLocaleString()}</span>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  document.getElementById('result').innerHTML = html;
  document.getElementById('result').scrollIntoView({behavior: 'smooth', block: 'nearest'});
}

// Add 3 default rows
addExpense();
addExpense();
addExpense();
</script>
</body>
</html>
