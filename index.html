<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分帳結算</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--card:#fff;--ink:#1A1A1A;--ink2:#555550;--ink3:#99998F;
  --accent:#2D5A3D;--accent-l:#EAF2EC;--accent2:#C8512A;--accent2-l:#FDF0EB;
  --border:#E5E2DA;--border2:#CCC9C0;
  --mono:'DM Mono',monospace;--sans:'Noto Sans TC',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;padding:2rem 1rem 5rem}
.wrap{max-width:640px;margin:0 auto}
header{margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1.5px solid var(--ink)}
h1{font-size:1.6rem;font-weight:700;letter-spacing:-.03em}
.sub{font-size:.72rem;font-family:var(--mono);color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-top:.2rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:.75rem}
.card-label{font-size:.65rem;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:.75rem}
input,select{width:100%;font-family:var(--sans);font-size:.9rem;color:var(--ink);background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:.55rem .75rem;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--border2)}
.hint{font-size:.7rem;font-family:var(--mono);color:var(--ink3);margin-top:.4rem;line-height:1.5}
.btn{width:100%;padding:.85rem;border:none;border-radius:10px;font-family:var(--sans);font-size:.9rem;font-weight:500;cursor:pointer;transition:all .2s;margin-top:.5rem}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:var(--accent);transform:translateY(-1px)}
.btn-primary:disabled{background:var(--border2);cursor:not-allowed;transform:none}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--ink2);font-size:.8rem;padding:.5rem 1rem;width:auto;margin-top:.75rem}
.btn-outline:hover{border-color:var(--ink);color:var(--ink)}
#status{font-size:.78rem;font-family:var(--mono);color:var(--ink3);margin-top:.6rem;min-height:1.2rem;text-align:center}
.spinner{display:inline-block;width:12px;height:12px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.result-block{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:.75rem;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.result-head{background:var(--ink);color:#fff;padding:.65rem 1.1rem;font-size:.65rem;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.bal-grid{display:grid;grid-template-columns:1fr 1fr}
.bal-item{padding:.75rem 1.1rem;border-bottom:1px solid var(--border);border-right:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:.875rem}
.bal-item:nth-child(even){border-right:none}
.bal-item:nth-last-child(-n+2){border-bottom:none}
.amt{font-family:var(--mono);font-size:.78rem;font-weight:500;padding:.2rem .45rem;border-radius:4px}
.amt-pos{background:var(--accent-l);color:var(--accent)}
.amt-neg{background:var(--accent2-l);color:var(--accent2)}
.amt-zero{background:var(--bg);color:var(--ink3)}
.transfer-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.1rem;border-bottom:1px solid var(--border);font-size:.875rem}
.transfer-item:last-child{border-bottom:none}
.t-from{font-weight:500;flex:1}
.t-arrow{color:var(--ink3);font-family:var(--mono);font-size:.75rem}
.t-to{font-weight:500;flex:1;text-align:right}
.t-amt{font-family:var(--mono);font-weight:500;color:var(--accent);min-width:72px;text-align:right}
.settled{text-align:center;padding:1.5rem;font-family:var(--mono);font-size:.78rem;color:var(--ink3)}
.notion-link{display:block;text-align:center;margin-top:.5rem;font-size:.75rem;font-family:var(--mono);color:var(--accent);text-decoration:none;letter-spacing:.04em}
.notion-link:hover{text-decoration:underline}
.setup-row{display:flex;gap:.5rem;align-items:center;margin-top:.5rem}
.setup-row input{flex:1}
.setup-row button{width:auto;padding:.55rem 1rem;margin-top:0;font-size:.85rem;white-space:nowrap}
@media(max-width:480px){.bal-grid{grid-template-columns:1fr}.bal-item{border-right:none}.bal-item:last-child{border-bottom:none}.bal-item:nth-last-child(2){border-bottom:1px solid var(--border)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>分帳結算</h1>
    <p class="sub">自動從 Notion 讀取支出 · 算出誰欠誰 · 結果寫回 Notion</p>
  </header>

  <!-- Setup: Worker URL + Token -->
  <div id="setup-section" class="card">
    <div class="card-label">初始設定（只需做一次）</div>

    <p style="font-size:.8rem;color:var(--ink2);margin-bottom:.75rem;line-height:1.6">
      輸入你的 Cloudflare Worker 網址和 Notion Token，儲存後就不用再填了。
    </p>

    <div style="margin-bottom:.75rem">
      <label style="font-size:.72rem;font-family:var(--mono);color:var(--ink3);letter-spacing:.06em;display:block;margin-bottom:.3rem">CLOUDFLARE WORKER 網址</label>
      <input type="text" id="worker-url-input" placeholder="https://notion-split-proxy.你的帳號.workers.dev">
    </div>

    <div>
      <label style="font-size:.72rem;font-family:var(--mono);color:var(--ink3);letter-spacing:.06em;display:block;margin-bottom:.3rem">NOTION TOKEN</label>
      <input type="password" id="token-input" placeholder="ntn_xxxxxxxxxxxxxxxx" autocomplete="off">
    </div>

    <p class="hint">資料只存在你的瀏覽器（localStorage），不會上傳到任何地方。</p>
    <button class="btn btn-primary" onclick="saveSetup()">儲存並連線</button>
  </div>

  <!-- Main: Select activity + settle -->
  <div id="main-section" class="card" style="display:none">
    <div class="card-label">選擇活動並結算</div>
    <select id="activity-select">
      <option value="">載入中...</option>
    </select>
    <p class="hint">從你的「活動列表」資料庫自動載入</p>
    <button class="btn btn-primary" id="calc-btn" onclick="doSettle()" disabled>讀取支出並結算</button>
    <div id="status"></div>
    <div style="text-align:center">
      <button class="btn-outline btn" onclick="showSetup()">重設連線設定</button>
    </div>
  </div>

  <div id="result"></div>
</div>

<script>
const DB_EXPENSES = 'dcbbb86be66c4edf8f3bee4159e16744';
const DB_ACTIVITIES = 'e17f055290e642a298d73d9922d46241';
const STORAGE_TOKEN = 'notion_split_token';
const STORAGE_WORKER = 'notion_split_worker';

let token = '';
let workerUrl = '';
let activities = [];

function api(path, options = {}) {
  const url = workerUrl.replace(/\/$/, '') + '/notion' + path;
  return fetch(url, {
    ...options,
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'Notion-Version': '2022-06-28',
      ...(options.headers || {}),
    },
  });
}

function setStatus(msg, loading = false) {
  document.getElementById('status').innerHTML = loading
    ? `<span class="spinner"></span>${msg}` : msg;
}

async function saveSetup() {
  const w = document.getElementById('worker-url-input').value.trim();
  const t = document.getElementById('token-input').value.trim();
  if (!w) { setStatus('請填入 Cloudflare Worker 網址'); return; }
  if (!t) { setStatus('請填入 Notion Token'); return; }
  workerUrl = w;
  token = t;
  localStorage.setItem(STORAGE_WORKER, w);
  localStorage.setItem(STORAGE_TOKEN, t);
  await initMain();
}

function showSetup() {
  document.getElementById('setup-section').style.display = 'block';
  document.getElementById('main-section').style.display = 'none';
  document.getElementById('result').innerHTML = '';
}

async function initMain() {
  document.getElementById('setup-section').style.display = 'none';
  document.getElementById('main-section').style.display = 'block';
  await loadActivities();
}

async function loadActivities() {
  setStatus('載入活動列表中...', true);
  try {
    const res = await api(`/v1/databases/${DB_ACTIVITIES}/query`, {
      method: 'POST',
      body: JSON.stringify({ page_size: 50 }),
    });
    if (!res.ok) throw new Error('連線失敗，請確認 Worker 網址和 Token 是否正確');
    const data = await res.json();
    activities = data.results || [];
    const sel = document.getElementById('activity-select');
    sel.innerHTML = '<option value="">請選擇活動...</option>';
    activities.forEach(p => {
      const name = p.properties['活動名稱']?.title?.[0]?.plain_text || '未命名';
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = name;
      sel.appendChild(opt);
    });
    sel.onchange = () => {
      document.getElementById('calc-btn').disabled = !sel.value;
    };
    setStatus('✓ 連線成功，請選擇活動');
  } catch (e) {
    setStatus('⚠ ' + e.message);
    showSetup();
  }
}

async function loadExpenses(activityName) {
  let all = [], cursor;
  while (true) {
    const body = {
      page_size: 100,
      filter: { property: '所屬活動', rich_text: { contains: activityName } },
    };
    if (cursor) body.start_cursor = cursor;
    const res = await api(`/v1/databases/${DB_EXPENSES}/query`, {
      method: 'POST',
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || '讀取支出失敗，請確認已授權支出明細資料庫');
    }
    const data = await res.json();
    all = all.concat(data.results || []);
    if (!data.has_more) break;
    cursor = data.next_cursor;
  }
  return all;
}

function parsePeople(str) {
  return (str || '').split(/[、，,\s]+/).map(s => s.trim()).filter(Boolean);
}

function calcSettlement(expenses) {
  const balance = {};
  let total = 0;
  expenses.forEach(p => {
    const props = p.properties;
    const amount = props['金額']?.number || 0;
    const payer = props['付款人']?.rich_text?.[0]?.plain_text || '';
    const splitPeople = parsePeople(props['分攤人員']?.rich_text?.[0]?.plain_text || '');
    if (!payer || amount <= 0 || !splitPeople.length) return;
    total += amount;
    balance[payer] = (balance[payer] || 0) + amount;
    splitPeople.forEach(p => { balance[p] = (balance[p] || 0) - amount / splitPeople.length; });
  });
  Object.keys(balance).forEach(k => { balance[k] = Math.round(balance[k]); });

  const c = Object.entries(balance).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]).map(([n,v]) => ({name:n,val:v}));
  const d = Object.entries(balance).filter(([,v]) => v < 0).sort((a,b) => a[1]-b[1]).map(([n,v]) => ({name:n,val:-v}));
  const transfers = [];
  let ci = 0, di = 0;
  while (ci < c.length && di < d.length) {
    const amt = Math.min(c[ci].val, d[di].val);
    if (amt > 0) transfers.push({ from: d[di].name, to: c[ci].name, amount: amt });
    c[ci].val -= amt; d[di].val -= amt;
    if (c[ci].val < 1) ci++;
    if (d[di].val < 1) di++;
  }
  return { balance, transfers, total };
}

async function writeToNotion(activityPageId, activityName, settlement) {
  const { balance, transfers, total } = settlement;
  const now = new Date().toLocaleDateString('zh-TW');

  const children = [
    { object: 'block', type: 'callout', callout: {
      rich_text: [{ type: 'text', text: { content: `自動結算 · ${now}` } }],
      icon: { type: 'emoji', emoji: '🤖' }, color: 'gray_background'
    }},
    { object: 'block', type: 'heading_2', heading_2: {
      rich_text: [{ type: 'text', text: { content: '每人帳目' } }]
    }},
    { object: 'block', type: 'paragraph', paragraph: {
      rich_text: [{ type: 'text', text: { content: `總支出 $${total.toLocaleString()}　共 ${Object.keys(balance).length} 人` }, annotations: { bold: true } }]
    }},
    ...Object.entries(balance).sort((a,b) => b[1]-a[1]).map(([name, val]) => ({
      object: 'block', type: 'paragraph', paragraph: {
        rich_text: [
          { type: 'text', text: { content: `${name}　` }, annotations: { bold: true } },
          { type: 'text', text: { content: val > 0 ? `應收 $${val.toLocaleString()}` : val < 0 ? `欠 $${Math.abs(val).toLocaleString()}` : '平帳' },
            annotations: { color: val > 0 ? 'green' : val < 0 ? 'red' : 'gray' } }
        ]
      }
    })),
    { object: 'block', type: 'heading_2', heading_2: {
      rich_text: [{ type: 'text', text: { content: '轉帳清單' } }]
    }},
    ...(transfers.length === 0
      ? [{ object: 'block', type: 'paragraph', paragraph: { rich_text: [{ type: 'text', text: { content: '大家都平帳，不需要轉帳！' } }] } }]
      : transfers.map(t => ({
          object: 'block', type: 'paragraph', paragraph: {
            rich_text: [
              { type: 'text', text: { content: `${t.from}` }, annotations: { bold: true } },
              { type: 'text', text: { content: '  →  ' } },
              { type: 'text', text: { content: `${t.to}` }, annotations: { bold: true } },
              { type: 'text', text: { content: `  $${t.amount.toLocaleString()}` }, annotations: { color: 'green', bold: true } }
            ]
          }
        }))
    ),
  ];

  const res = await api('/v1/pages', {
    method: 'POST',
    body: JSON.stringify({
      parent: { page_id: activityPageId },
      icon: { type: 'emoji', emoji: '✅' },
      properties: { title: { title: [{ text: { content: `結算結果 · ${now}` } }] } },
      children,
    }),
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || '寫入 Notion 失敗');
  }
  return await res.json();
}

async function doSettle() {
  const sel = document.getElementById('activity-select');
  const activityId = sel.value;
  const activityName = sel.options[sel.selectedIndex]?.text;
  if (!activityId) return;

  document.getElementById('calc-btn').disabled = true;
  document.getElementById('result').innerHTML = '';

  try {
    setStatus(`讀取「${activityName}」支出中...`, true);
    const expenses = await loadExpenses(activityName);

    if (!expenses.length) {
      setStatus(`⚠ 找不到「${activityName}」的支出，請確認「所屬活動」欄位名稱一致`);
      return;
    }

    setStatus(`計算中（共 ${expenses.length} 筆支出）...`, true);
    const settlement = calcSettlement(expenses);

    setStatus('寫入 Notion...', true);
    const page = await writeToNotion(activityId, activityName, settlement);

    setStatus('');
    renderResult(settlement, activityName, page?.url);
  } catch (e) {
    setStatus('⚠ ' + e.message);
  } finally {
    document.getElementById('calc-btn').disabled = false;
  }
}

function renderResult(settlement, activityName, notionUrl) {
  const { balance, transfers, total } = settlement;
  let html = `<div class="result-block">
    <div class="result-head"><span>${activityName} · 帳目</span><span>總計 $${total.toLocaleString()}</span></div>
    <div class="bal-grid">`;
  Object.entries(balance).sort((a,b) => b[1]-a[1]).forEach(([name, val]) => {
    const cls = val > 0 ? 'amt-pos' : val < 0 ? 'amt-neg' : 'amt-zero';
    const label = val > 0 ? `+$${val.toLocaleString()}` : val < 0 ? `-$${Math.abs(val).toLocaleString()}` : '平帳';
    html += `<div class="bal-item"><span style="font-weight:500">${name}</span><span class="amt ${cls}">${label}</span></div>`;
  });
  html += `</div></div>`;

  html += `<div class="result-block">
    <div class="result-head"><span>轉帳清單</span><span>${transfers.length} 筆</span></div>`;
  if (!transfers.length) {
    html += `<div class="settled">大家都平帳了，不需要轉帳！</div>`;
  } else {
    transfers.forEach(t => {
      html += `<div class="transfer-item">
        <span class="t-from">${t.from}</span>
        <span class="t-arrow">→</span>
        <span class="t-to">${t.to}</span>
        <span class="t-amt">$${t.amount.toLocaleString()}</span>
      </div>`;
    });
  }
  html += `</div>`;

  if (notionUrl) {
    html += `<a class="notion-link" href="${notionUrl}" target="_blank">✓ 已寫入 Notion，點此查看 →</a>`;
  }

  document.getElementById('result').innerHTML = html;
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

window.onload = () => {
  const w = localStorage.getItem(STORAGE_WORKER);
  const t = localStorage.getItem(STORAGE_TOKEN);
  if (w && t) {
    workerUrl = w; token = t;
    document.getElementById('worker-url-input').value = w;
    document.getElementById('token-input').value = t;
    initMain();
  }
};
</script>
</body>
</html>
